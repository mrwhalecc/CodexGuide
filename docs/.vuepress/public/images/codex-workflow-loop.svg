  <path d="M608 248 L712 248" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M888 270 L960 330" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
