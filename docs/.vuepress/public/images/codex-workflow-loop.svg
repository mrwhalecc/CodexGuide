<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex 高质量任务闭环</title>
  <desc id="desc">把一次任务拆成可观察、可验证、可复盘的工程循环。</desc>
  <rect width="1280" height="720" rx="4" fill="#F6F7F9"/>
  <rect x="48" y="48" width="1184" height="624" rx="4" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
  <text x="88" y="108" fill="#0C1222" font-family="'Source Serif 4', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="600">Codex 高质量任务闭环</text>
  <text x="88" y="148" fill="#3D4F66" font-family="'Source Sans 3', 'PingFang SC', sans-serif" font-size="20">把一次任务拆成可观察、可验证、可复盘的工程循环。</text>
  <g font-family="'Source Sans 3', 'PingFang SC', sans-serif">
    <circle cx="260" cy="360" r="88" fill="#FFFFFF" stroke="#0F766E" stroke-width="2"/>
