    <text x="200" y="382" fill="#3D4F66" font-size="16">目标 / 范围 / 约束</text>
    <circle cx="520" cy="248" r="88" fill="#FFFFFF" stroke="#1A365D" stroke-width="2"/>
    <text x="488" y="240" fill="#0C1222" font-size="22" font-weight="700">探索</text>
    <text x="460" y="270" fill="#3D4F66" font-size="16">读仓库 / 找入口</text>
    <circle cx="800" cy="248" r="88" fill="#FFFFFF" stroke="#5B4B8A" stroke-width="2"/>
    <text x="768" y="240" fill="#0C1222" font-size="22" font-weight="700">实施</text>
    <text x="744" y="270" fill="#3D4F66" font-size="16">小步修改 / 控制 diff</text>
    <circle cx="1020" cy="360" r="88" fill="#FFFFFF" stroke="#B45309" stroke-width="2"/>
    <text x="988" y="352" fill="#0C1222" font-size="22" font-weight="700">验证</text>
    <text x="960" y="382" fill="#3D4F66" font-size="16">测试 / 运行 / 检查</text>
    <circle cx="640" cy="512" r="88" fill="#FFFFFF" stroke="#6B7C93" stroke-width="2"/>
