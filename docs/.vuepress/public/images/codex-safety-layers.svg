<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex 安全边界分层</title>
  <desc id="desc">项目规则、运行环境与人工验证共同约束任务风险。</desc>
  <rect width="1280" height="720" rx="4" fill="#F6F7F9"/>
  <rect x="48" y="48" width="1184" height="624" rx="4" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
  <text x="88" y="108" fill="#0C1222" font-family="'Source Serif 4', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="600">Codex 安全边界分层</text>
  <text x="88" y="148" fill="#3D4F66" font-family="'Source Sans 3', 'PingFang SC', sans-serif" font-size="20">用项目规则、运行环境和人工验证共同约束任务风险。</text>
  <g font-family="'Source Sans 3', 'PingFang SC', sans-serif">
    <rect x="120" y="200" width="1040" height="88" rx="4" fill="#FFFFFF" stroke="#0F766E" stroke-width="2"/>
    <rect x="120" y="200" width="6" height="88" rx="2" fill="#0F766E"/>
    <text x="148" y="242" fill="#0C1222" font-size="24" font-weight="700">1. 任务说明</text>
    <text x="148" y="272" fill="#3D4F66" font-size="18">目标、范围、禁止事项、验收标准</text>
    <rect x="160" y="308" width="960" height="88" rx="4" fill="#FFFFFF" stroke="#1A365D" stroke-width="2"/>
    <rect x="160" y="308" width="6" height="88" rx="2" fill="#1A365D"/>
    <text x="188" y="350" fill="#0C1222" font-size="24" font-weight="700">2. AGENTS.md</text>
    <text x="188" y="380" fill="#3D4F66" font-size="18">项目结构、命令、代码规范、安全规则</text>
    <rect x="200" y="416" width="880" height="88" rx="4" fill="#FFFFFF" stroke="#5B4B8A" stroke-width="2"/>
    <rect x="200" y="416" width="6" height="88" rx="2" fill="#5B4B8A"/>
    <text x="228" y="458" fill="#0C1222" font-size="24" font-weight="700">3. 沙盒与审批</text>
    <text x="228" y="488" fill="#3D4F66" font-size="18">文件写入、网络、命令执行、提权确认</text>
    <rect x="240" y="524" width="800" height="88" rx="4" fill="#FFFFFF" stroke="#B45309" stroke-width="2"/>
    <rect x="240" y="524" width="6" height="88" rx="2" fill="#B45309"/>
    <text x="268" y="566" fill="#0C1222" font-size="24" font-weight="700">4. 验证与评审</text>
    <text x="268" y="596" fill="#3D4F66" font-size="18">测试、diff、人工 review、上线检查</text>
  </g>
</svg>
