<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex 配置地图</title>
  <desc id="desc">展示 Codex 从项目规则、CLI 配置、扩展能力到安全边界的配置层级。</desc>
  <rect width="1200" height="680" rx="4" fill="#F6F7F9"/>
  <rect x="48" y="48" width="1104" height="584" rx="4" fill="#FFFFFF" stroke="#D8DEE8" stroke-width="1.5"/>
  <text x="88" y="108" fill="#0C1222" font-family="'Source Serif 4', 'Noto Serif SC', Georgia, serif" font-size="36" font-weight="600">Codex 配置地图</text>
  <text x="88" y="148" fill="#3D4F66" font-family="'Source Sans 3', 'PingFang SC', sans-serif" font-size="20">先管规则，再配环境，随后扩展能力，最后收紧安全边界。</text>
  <g font-family="'Source Sans 3', 'PingFang SC', sans-serif">
